spring.application.name=solicitacao-saque

spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:mongodb://localhost:27017/saque-db}}

logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.springframework.data.mongodb.MongoTransactionManager=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [correlationId:%X{correlationId}] %-5level %logger - %msg%n
spring.web.error.include-message=always


management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true